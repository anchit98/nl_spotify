<body class="bg-background text-on-surface font-body-main h-screen w-screen overflow-hidden antialiased">
<!-- Simulated Background Context (Blurred out) -->
<div aria-hidden="true" class="absolute inset-0 flex">
<!-- Mock Sidebar -->
<div class="w-64 bg-surface-container-lowest border-r border-subtle hidden md:flex flex-col py-8 gap-y-4 px-4">
<div class="w-8 h-8 rounded-full bg-surface-high mb-8"></div>
<div class="w-full h-10 rounded bg-surface-high/50"></div>
<div class="w-full h-10 rounded bg-surface-high/20"></div>
<div class="w-full h-10 rounded bg-surface-high/20"></div>
</div>
<!-- Mock Main Content -->
<div class="flex-1 flex flex-col">
<div class="h-16 border-b border-subtle bg-surface/75 px-margin-desktop flex items-center justify-between">
<div class="w-32 h-6 bg-surface-high/50 rounded"></div>
<div class="w-8 h-8 bg-surface-high/50 rounded-full"></div>
</div>
<div class="p-margin-desktop grid grid-cols-3 gap-card-gap">
<div class="h-64 bg-surface-low border border-subtle rounded-xl col-span-2"></div>
<div class="h-64 bg-surface-low border border-subtle rounded-xl col-span-1"></div>
<div class="h-64 bg-surface-low border border-subtle rounded-xl col-span-3"></div>
</div>
</div>
</div>
<!-- Modal Overlay Backdrop (Deep Glass Blur) -->
<div class="fixed inset-0 z-40 bg-background/85 backdrop-blur-[24px]"></div>
<!-- Modal Container -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-margin-mobile md:p-margin-desktop pointer-events-none">
<!-- Interactive Wrapper -->
<div class="w-full max-w-5xl flex items-center justify-center gap-6 pointer-events-auto relative">
<!-- Floating Previous Arrow (Desktop) -->
<button aria-label="Previous quote" class="hidden md:flex w-14 h-14 rounded-full bg-surface-low border border-subtle items-center justify-center text-on-surface-variant hover:text-primary hover:bg-surface-high hover:border-primary/50 transition-all duration-200 shadow-lg group -ml-20 absolute left-0">
<span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
</button>
<!-- Main Modal Card -->
<div class="w-full bg-surface-low border border-subtle rounded-[1.5rem] shadow-2xl overflow-hidden flex flex-col relative transform transition-all shadow-[0_0_80px_rgba(0,0,0,0.8)]">
<!-- Inner Subtle Glow -->
<div class="absolute inset-0 rounded-[1.5rem] ring-1 ring-inset ring-white/[0.03] pointer-events-none"></div>
<!-- Header Actions (Close) -->
<div class="absolute top-6 right-6 z-10">
<button aria-label="Close modal" class="w-10 h-10 rounded-full flex items-center justify-center text-on-surface-variant hover:text-on-surface hover:bg-surface-high transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
</button>
</div>
<!-- Content Padding -->
<div class="p-8 md:p-14 flex flex-col gap-10">
<!-- Source Metadata -->
<div class="flex flex-wrap items-center gap-4 font-metadata text-metadata text-text-muted">
<!-- Platform Badge -->
<div class="flex items-center gap-2 bg-surface-high/50 px-3 py-1.5 rounded-full border border-subtle">
<span class="material-symbols-outlined text-[16px] text-on-surface" data-icon="shop">shop</span>
<span class="text-on-surface font-medium">Google Play</span>
</div>
<div class="w-1 h-1 rounded-full bg-text-muted/50"></div>
<!-- Rating -->
<div aria-label="2 out of 5 stars" class="flex items-center gap-1">
<span class="material-symbols-outlined text-[16px] text-status-warning" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[16px] text-status-warning" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[16px] text-surface-high" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[16px] text-surface-high" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[16px] text-surface-high" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<div class="w-1 h-1 rounded-full bg-text-muted/50"></div>
<!-- Date -->
<span>Posted May 12, 2026</span>
</div>
<!-- The Quote -->
<div class="relative">
<!-- Decorative large quote mark -->
<span class="material-symbols-outlined absolute -top-8 -left-6 text-[80px] text-surface-high opacity-50 pointer-events-none" data-icon="format_quote" style="font-variation-settings: 'FILL' 1;">format_quote</span>
<blockquote class="relative z-10 font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface tracking-tight border-l-[3px] border-primary-container pl-6 md:pl-8 py-2 max-w-3xl">
                            "Shuffle is rubbish, make a playlist with 47 hours of songs and every time you play you hear the same songs."
                        </blockquote>
</div>
<!-- Tags / Context (Optional conceptual addition for bento style) -->
<div class="flex flex-wrap gap-2 pt-2">
<span class="px-3 py-1 rounded-full border border-subtle bg-surface-container text-on-surface-variant font-label-caps text-label-caps flex items-center gap-1">
<span class="w-2 h-2 rounded-full bg-primary-container"></span>
                            Algorithmic Fatigue
                        </span>
<span class="px-3 py-1 rounded-full border border-subtle bg-surface-container text-on-surface-variant font-label-caps text-label-caps">
                            Playlist Generation
                        </span>
</div>
</div>
<!-- Footer Actions -->
<div class="mt-auto border-t border-subtle bg-surface-container-low/50 px-8 md:px-14 py-6 flex flex-col md:flex-row items-center justify-between gap-6">
<!-- Primary Action -->
<button class="flex items-center gap-2 px-6 py-2.5 rounded-full border border-subtle bg-surface-high hover:bg-surface-bright text-on-surface font-label-caps text-label-caps transition-all duration-150 group w-full md:w-auto justify-center">
<span class="material-symbols-outlined text-[18px] group-hover:text-primary transition-colors" data-icon="content_copy">content_copy</span>
                        Copy Quote
                    </button>
<!-- Navigation Controls (Mobile visible, Desktop alternative) -->
<div class="flex items-center gap-4 text-text-muted font-metadata text-metadata">
<button class="md:hidden w-10 h-10 rounded-full border border-subtle flex items-center justify-center hover:bg-surface-high hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex items-center gap-2 bg-surface-high/30 px-4 py-1.5 rounded-full border border-subtle">
<span class="text-on-surface font-medium">14</span>
<span>of</span>
<span>1,248</span>
</div>
<button class="md:hidden w-10 h-10 rounded-full border border-subtle flex items-center justify-center hover:bg-surface-high hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</div>
<!-- Floating Next Arrow (Desktop) -->
<button aria-label="Next quote" class="hidden md:flex w-14 h-14 rounded-full bg-surface-low border border-subtle items-center justify-center text-on-surface-variant hover:text-primary hover:bg-surface-high hover:border-primary/50 transition-all duration-200 shadow-lg group -mr-20 absolute right-0">
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
