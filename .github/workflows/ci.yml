name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_ENV: staging
        run: npm run build

  backend:
    name: Backend import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-deploy.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-deploy.txt

      - name: Verify app imports
        env:
          SUPABASE_PROJECT_URL: https://example.supabase.co
          SUPABASE_PROJECT_ANON_KEY: placeholder
          GROQ_API_KEY: placeholder
          APP_ENV: staging
        run: |
          PYTHONPATH=backend/src python -c "from backend_api.main import app; assert app.title"

  phase6-ci:
    name: Phase 6 CI checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: phase6-deploy/requirements.txt

      - name: Install Phase 6 tools
        run: pip install -r phase6-deploy/requirements.txt

      - name: Run Phase 6 CI (secret scan, migrations, env pairing)
        env:
          PYTHONPATH: ${{ github.workspace }}/phase6-deploy/src
          SUPABASE_PROJECT_URL: https://example.supabase.co
          SUPABASE_PROJECT_ANON_KEY: placeholder
          APP_ENV: staging
          EXPECTED_SUPABASE_PROJECT_REF: example
        run: python -m phase6_deploy.runner ci

  groq-smoke:
    name: Groq smoke test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: phase6-deploy/requirements.txt

      - name: Install Phase 6 tools
        run: pip install -r phase6-deploy/requirements.txt

      - name: Groq API smoke test
        env:
          PYTHONPATH: ${{ github.workspace }}/phase6-deploy/src
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
        run: python -m phase6_deploy.runner groq-smoke
