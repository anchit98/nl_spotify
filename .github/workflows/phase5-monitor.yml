name: Phase 5 Monitor

on:
  workflow_run:
    workflows: ["Data Pipeline (Phases 1-3)"]
    types: [completed]
  schedule:
    - cron: '30 3 * * 1'  # Monday 03:30 UTC — after weekly pipeline
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Monitor trigger label'
        required: false
        default: manual
        type: choice
        options:
          - manual
          - weekly
          - post_pipeline
          - adhoc

jobs:
  monitor:
    name: Health snapshot + drift alerts
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: phase5-operations/requirements.txt

      - name: Install dependencies
        run: pip install -r phase5-operations/requirements.txt

      - name: Run Phase 5 monitor
        env:
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_PROJECT_ANON_KEY: ${{ secrets.SUPABASE_PROJECT_ANON_KEY }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          GROQ_MODEL: llama-3.3-70b-versatile
          PROMPT_VERSION: 2026-06-v1
          PYTHONPATH: ${{ github.workspace }}/phase5-operations/src
        run: |
          TRIGGER="${{ github.event.inputs.trigger || 'post_pipeline' }}"
          if [ "${{ github.event_name }}" = "schedule" ]; then TRIGGER=weekly; fi
          python -m phase5_ops.runner monitor --trigger "$TRIGGER"

      - name: Upload health report
        uses: actions/upload-artifact@v4
        with:
          name: phase5-health-report
          path: phase5-operations/reports/
          if-no-files-found: warn

  pipeline-failed-alert:
    name: Alert on pipeline failure
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: phase5-operations/requirements.txt

      - name: Install dependencies
        run: pip install -r phase5-operations/requirements.txt

      - name: Fire pipeline failure alert
        env:
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_PROJECT_ANON_KEY: ${{ secrets.SUPABASE_PROJECT_ANON_KEY }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          PYTHONPATH: ${{ github.workspace }}/phase5-operations/src
        run: |
          python -m phase5_ops.runner pipeline-failure \
            --workflow "Data Pipeline (Phases 1-3)" \
            --job "see workflow_run logs" \
            --error "Pipeline run ${{ github.event.workflow_run.id }} failed. URL: ${{ github.event.workflow_run.html_url }}"
