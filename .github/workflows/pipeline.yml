name: Data Pipeline (Phases 1-3)

on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 02:00 UTC — weekly incremental pull
  workflow_dispatch:
    inputs:
      mode:
        description: 'Collection mode'
        required: false
        type: choice
        options:
          - weekly
          - adhoc
          - initial
          - probe
        default: weekly

jobs:
  collect:
    name: Phase 1 - Collection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r phase1-collection/requirements.txt

      - name: Run collection
        env:
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_PROJECT_ANON_KEY: ${{ secrets.SUPABASE_PROJECT_ANON_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          PYTHONPATH: ${{ github.workspace }}/phase1-collection/src
        run: |
          MODE="${{ github.event.inputs.mode || 'weekly' }}"
          for attempt in 1 2 3; do
            echo "Collection attempt $attempt..."
            if python -m phase1_collection.runner --mode "$MODE"; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Retrying in 30s..."
              sleep 30
            fi
          done
          exit 1

  clean:
    name: Phase 2 - Cleaning
    needs: collect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r phase2-cleaning/requirements.txt

      - name: Run cleaning
        env:
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_PROJECT_ANON_KEY: ${{ secrets.SUPABASE_PROJECT_ANON_KEY }}
          PYTHONPATH: ${{ github.workspace }}/phase2-cleaning/src
        run: |
          for attempt in 1 2 3; do
            echo "Cleaning attempt $attempt..."
            if python -m phase2_cleaning.cleaner; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep 30
            fi
          done
          exit 1

  synthesize:
    name: Phase 3 - Insight synthesis (Groq)
    needs: clean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r phase3-enrichment/requirements.txt

      - name: Run synthesis
        env:
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_PROJECT_ANON_KEY: ${{ secrets.SUPABASE_PROJECT_ANON_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}/phase3-enrichment/src
        run: |
          for attempt in 1 2; do
            echo "Synthesis attempt $attempt..."
            if python -m phase3_insights.synthesizer; then
              exit 0
            fi
            if [ "$attempt" -lt 2 ]; then
              echo "Retrying in 60s..."
              sleep 60
            fi
          done
          exit 1
