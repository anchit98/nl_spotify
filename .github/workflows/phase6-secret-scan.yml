name: Secret scan

on:
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: phase6-deploy/requirements.txt

      - name: Install Phase 6 tools
        run: pip install -r phase6-deploy/requirements.txt

      - name: Scan repository for secrets
        env:
          PYTHONPATH: ${{ github.workspace }}/phase6-deploy/src
        run: python -m phase6_deploy.runner secret-scan
