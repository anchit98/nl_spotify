name: Phase 6 deploy smoke

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which environment to smoke-test
        required: true
        type: choice
        options:
          - staging
          - production
          - both

jobs:
  smoke:
    name: Post-deploy API smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: phase6-deploy/requirements.txt

      - name: Install Phase 6 tools
        run: pip install -r phase6-deploy/requirements.txt

      - name: Smoke test deployed APIs
        env:
          PYTHONPATH: ${{ github.workspace }}/phase6-deploy/src
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ "$TARGET" = "staging" ]; then
            export PRODUCTION_API_URL=""
          elif [ "$TARGET" = "production" ]; then
            export STAGING_API_URL=""
          fi
          python -m phase6_deploy.runner deploy-smoke
